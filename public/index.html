<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNSLINGER | 槍手專業代儲平台</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5865F2; --accent: #00f2ff; --bg: #0a0a0f; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --price-text: #4dfd63; --text: #ffffff; }
        body.light-mode { --bg: #f0f2f5; --card-bg: #ffffff; --border: #dcdde1; --text: #2f3640; --price-text: #27ae60; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; background-image: radial-gradient(circle at 50% 0%, #161625 0%, #0a0a0f 70%); }
        header { padding: 15px 20px; background: rgba(10, 10, 15, 0.8); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Oxanium', sans-serif; font-size: 1.8rem; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1400px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; backdrop-filter: blur(10px); position: relative;}
        .admin-edit-zone { display: none; background: #1a1a25; border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .admin-edit-zone textarea { width: 100%; height: 100px; background: #000; color: #4dfd63; }
        .admin-bar { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a25; padding: 12px; border-top: 2px solid var(--primary); z-index: 1999; justify-content: center; gap: 20px; }
        .price-display { text-align: center; font-size: 2rem; color: var(--price-text); font-family: 'Oxanium'; }
        .order-btn { background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GUNSLINGER STORE</div>
    <div>
        <div id="g_id_onload"
             data-client_id="446221628195-8b1qsqhgv065p17fl115tupc9lob730pq.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
    </div>
</header>

<div class="container">
    <div id="productGrid" class="grid">載入中...</div>
</div>

<div class="admin-bar" id="adminBar">
    <button onclick="addNewProduct()" style="background:#4dfd63; padding:10px;">＋ 新增商品</button>
    <button onclick="saveChanges()" style="background:#5865F2; color:white; padding:10px;">💾 儲存更新</button>
    <button onclick="location.reload()" style="background:#ff4d4f; color:white; padding:10px;">登出</button>
</div>

<script>
    let products = [];
    let userToken = "";

    async function init() {
        // 對接你 index.js 中的 GET 邏輯
        const res = await fetch('/api');
        const data = await res.json();
        products = data.products || [];
        render();
    }

    function handleCredentialResponse(response) {
        userToken = response.credential;
        // 呼叫你的後端進行驗證 (對應你的 index.js POST 邏輯)
        fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: userToken })
        }).then(res => res.json()).then(data => {
            if (data.success) {
                document.getElementById('adminBar').style.display = 'flex';
                render(true);
            } else {
                alert("非管理員帳號");
            }
        });
    }

    async function saveChanges() {
        // 對接你的 index.js action: "save" 邏輯
        const res = await fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: userToken, action: "save", newData: products })
        });
        const result = await res.json();
        if (result.success) alert("儲存成功！");
    }

    function render(isEdit = false) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                ${isEdit ? `
                <div class="admin-edit-zone" style="display:block;">
                    <input type="text" value="${p.title}" onchange="products[${i}].title=this.value">
                    <textarea onchange="products[${i}].options=JSON.parse(this.value)">${JSON.stringify(p.options)}</textarea>
                </div>` : ''}
                <div style="font-size:1.2rem; font-weight:bold; margin-bottom:10px;">${p.title}</div>
                <select onchange="document.getElementById('p-${i}').innerText = this.value">
                    ${p.options.map(opt => `<option value="${opt.price}">${opt.label}</option>`).join('')}
                </select>
                <div class="price-display">NT$ <span id="p-${i}">${p.options[0].price}</span></div>
                <a href="https://discord.gg/aveVvmcpsZ" class="order-btn" target="_blank">立即開單</a>
            `;
            grid.appendChild(card);
        });
    }

    function addNewProduct() {
        products.unshift({ title: "新商品", options: [{label: "100面額", price: 100}], category: "topup", status: "active" });
        render(true);
    }

    init();
</script>
</body>
</html>
