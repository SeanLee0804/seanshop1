<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>商城後台管理系統</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #admin-content { display: none; margin-top: 20px; padding: 20px; border: 1px solid #ccc; }
        textarea { width: 100%; height: 300px; font-family: monospace; margin-bottom: 10px; }
        .save-btn { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .save-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>遊戲商城 - 後台管理</h2>

    <div id="auth-provider">
        <div id="g_id_onload"
             data-client_id="446221628195-8b1qsqhgv065p17fl115tupc9lob730pq.apps.googleusercontent.com"
             data-callback="onGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="admin-content">
        <p id="welcome-msg"></p>
        <h3>修改商城資料 (JSON 格式)</h3>
        <textarea id="data-editor" placeholder="請輸入要修改的商城 HTML 或 JSON 資料..."></textarea>
        <br>
        <button class="save-btn" onclick="triggerSave()">確認修改並儲存到後端</button>
    </div>

    <script>
        // 4. 處理登入：驗證成功後「解鎖」後台
        function onGoogleLogin(response) {
            const token = response.credential;
            const payload = JSON.parse(atob(token.split('.')[1]));

            // 這裡對接你已經做好的後端驗證 API
            fetch('/verify-admin-api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: token })
            }).then(res => {
                if (res.ok) {
                    // 驗證成功，顯示後台
                    document.getElementById('auth-provider').style.display = 'none';
                    document.getElementById('admin-content').style.display = 'block';
                    document.getElementById('welcome-msg').innerText = "當前管理員：" + payload.name;
                    
                    // 這裡可以順便載入現有的商城資料到 textarea
                    loadCurrentData();
                } else {
                    alert("權限不足，無法進入後台。");
                }
            });
        }

        // 5. 載入資料邏輯
        function loadCurrentData() {
            // 從你原本的資料庫或檔案抓取現有資料
            fetch('/get-shop-data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('data-editor').value = JSON.stringify(data, null, 2);
                });
        }

        // 6. 儲存修改邏輯 (對接你做好的後台儲存功能)
        function triggerSave() {
            const content = document.getElementById('data-editor').value;
            
            fetch('/save-shop-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ newData: content })
            })
            .then(res => {
                if (res.ok) alert("儲存成功！");
                else alert("儲存失敗，請檢查伺服器狀態。");
            });
        }
    </script>
</body>
</html>
