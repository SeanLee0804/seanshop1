<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵喵 Steam 商店 - 雲端管理版</title>
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <meta name="google-signin-client_id" content="446221628195-8b1qsqhgv065p17fl115tupc9lob730pq.apps.googleusercontent.com">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .admin-panel { margin-top: 30px; padding: 15px; border-top: 2px dashed #ccc; display: none; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #5c67f2; color: white; margin: 5px; }
        .btn-save { background: #28a745; font-weight: bold; }
        #admin-key { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; cursor: pointer; font-size: 20px; }
        #admin-key:hover { opacity: 1; }
        textarea { width: 100%; height: 200px; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 喵喵 Steam 商店</h1>
    
    <div id="product-container" class="product-list">
        <p style="text-align: center;">正在載入雲端最新價格...</p>
    </div>

    <div id="admin-panel" class="admin-panel">
        <h3>🛠️ 管理員控制台</h3>
        <p>在此修改 Steam 價格 JSON 資料：</p>
        <textarea id="json-input"></textarea>
        <br>
        <button class="btn btn-save" id="save-btn" onclick="saveToCloud()">💾 一鍵保存到雲端</button>
        <button class="btn" onclick="applyLocal()">👀 預覽修改</button>
    </div>
</div>

<div id="admin-key" onclick="toggleAdmin()">🔑</div>
<div id="my-signin" style="display: none;"></div>

<script>
    // 預設資料（若雲端沒資料時用）
    let steamData = [
        { "name": "Steam 500 TWD", "price": 550, "stock": 10 },
        { "name": "Steam 1000 TWD", "price": 1080, "stock": 5 }
    ];

    // 1. 初始化：從雲端抓資料
    async function initStore() {
        try {
            const res = await fetch('/api');
            const data = await res.json();
            if (data.products) {
                steamData = data.products;
                console.log("✅ 已載入雲端資料");
            }
        } catch (e) {
            console.error("❌ 無法連接雲端");
        }
        renderProducts();
    }

    // 2. 畫出商品畫面
    function renderProducts() {
        const container = document.getElementById('product-container');
        container.innerHTML = steamData.map(item => `
            <div class="product-card">
                <h3>${item.name}</h3>
                <p style="color: #e44d26; font-size: 1.2em; font-weight: bold;">NT$ ${item.price}</p>
                <p>庫存：${item.stock}</p>
            </div>
        `).join('');
        document.getElementById('json-input').value = JSON.stringify(steamData, null, 2);
    }

    // 3. 預覽修改（不存檔）
    function applyLocal() {
        try {
            steamData = JSON.parse(document.getElementById('json-input').value);
            renderProducts();
            alert("預覽更新成功！別忘了按下「一鍵保存」才會永久生效喔。");
        } catch (e) {
            alert("JSON 格式有誤，請檢查。");
        }
    }

    // 4. 【核心功能】存檔到 Vercel Storage (Redis)
    async function saveToCloud() {
        const authInstance = gapi.auth2.getAuthInstance();
        if (!authInstance.isSignedIn.get()) {
            alert("老闆請先登入！");
            gapi.signin2.render('my-signin', { 'onsuccess': onSignIn });
            document.getElementById('my-signin').click();
            return;
        }

        const token = authInstance.currentUser.get().getAuthResponse().id_token;
        const saveBtn = document.getElementById('save-btn');
        saveBtn.innerText = "🚀 同步中...";
        saveBtn.disabled = true;

        try {
            const res = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    action: 'save',
                    newData: JSON.parse(document.getElementById('json-input').value)
                })
            });

            if (res.ok) {
                alert("✅ 雲端同步成功！全網價格已更新。");
                location.reload(); // 刷新網頁確認
            } else {
                alert("❌ 保存失敗，可能權限不足。");
            }
        } catch (e) {
            alert("❌ 連線錯誤，請確認後端設定。");
        } finally {
            saveBtn.innerText = "💾 一鍵保存到雲端";
            saveBtn.disabled = false;
        }
    }

    // 5. 管理員權限顯示
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function onSignIn(googleUser) {
        console.log('已登入：' + googleUser.getBasicProfile().getName());
        alert("管理員身分已驗證！");
    }

    // 網頁啟動！
    window.onload = initStore;
</script>

</body>
</html>
