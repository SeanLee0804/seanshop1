<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GUNSLINGER | 專業代儲</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- 🎨 所有 CSS 樣式 --- */
        :root { --primary: #5865F2; --accent: #00f2ff; --bg: #0a0a0f; --text: #ffffff; --price: #4dfd63; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: 'Oxanium'; font-size: 2rem; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .admin-bar { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a25; padding: 15px; z-index: 100; justify-content: center; gap: 10px; border-top: 2px solid var(--primary); }
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<header><div class="logo">GUNSLINGER STORE</div></header>

<div class="container">
    <div id="productGrid" class="grid"></div>
</div>

<div id="loginOverlay" class="login-overlay">
    <h2 style="color:white">管理員驗證</h2>
    <div id="g_id_onload" data-client_id="你的_GOOGLE_CLIENT_ID" data-callback="handleLogin"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <button onclick="document.getElementById('loginOverlay').style.display='none'" style="margin-top:20px;">關閉</button>
</div>

<button onclick="document.getElementById('loginOverlay').style.display='flex'" style="position:fixed; bottom:20px; right:20px; border-radius:50%; width:50px; height:50px; background:var(--primary); color:white; border:none; cursor:pointer;">🔑</button>

<div class="admin-bar" id="adminBar">
    <button onclick="addNew()">＋ 新增商品</button>
    <button onclick="copyJSON()" style="background:var(--primary); color:white;">💾 複製最新資料 (去 GitHub 貼上)</button>
    <button onclick="location.reload()">登出</button>
</div>

<script>
    // --- 📦 商品資料 (直接寫在 HTML 裡) ---
    let products = [
        { title: "🎮 Steam 蒸氣卡", category: "card", options: [{label: "1000元", price: 1060}, {label: "100元", price: 118}] },
        { title: "🌵 荒野亂鬥", category: "topup", options: [{label: "2000 寶石", price: 3190}] }
    ];

    let isEdit = false;

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map((p, i) => `
            <div class="card">
                ${isEdit ? `<textarea onchange="update(${i}, this.value)">${JSON.stringify(p)}</textarea>` : ''}
                <h3>${p.title}</h3>
                <select onchange="document.getElementById('price-${i}').innerText = this.value">
                    ${p.options.map(opt => `<option value="${opt.price}">${opt.label}</option>`).join('')}
                </select>
                <p>NT$ <span id="price-${i}">${p.options[0].price}</span></p>
                <a href="https://discord.gg/aveVvmcpsZ" style="color:var(--primary)">立即開單</a>
            </div>
        `).join('');
    }

    async function handleLogin(response) {
        const res = await fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });
        if (res.ok) {
            isEdit = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminBar').style.display = 'flex';
            render();
        } else { alert("你不是管理員！"); }
    }

    function addNew() { products.unshift({title:"新商品", options:[{label:"100", price:100}]}); render(); }
    function update(i, val) { products[i] = JSON.parse(val); render(); }
    function copyJSON() {
        navigator.clipboard.writeText(JSON.stringify(products, null, 2));
        alert("資料已複製！請手動貼回 GitHub 的 index.html 裡的 products 變數中。");
    }

    render();
</script>
</body>
</html>
