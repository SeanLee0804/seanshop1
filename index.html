<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNSLINGER | 槍手專業代儲平台</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5865F2; --accent: #00f2ff; --bg: #0a0a0f; --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --price-text: #4dfd63; --text: #ffffff;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; background-image: radial-gradient(circle at 50% 0%, #161625 0%, #0a0a0f 70%); }
        header { padding: 15px 20px; background: rgba(10, 10, 15, 0.8); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Oxanium', sans-serif; font-size: 1.8rem; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1400px; margin: auto; padding: 20px; }
        
        /* 工具列 */
        .tool-box { background: var(--card-bg); border: 1px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .tool-box input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 110px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 22px; border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .filter-btn.active { background: var(--primary); color: white; }

        /* 商品展示 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .card-title { font-size: 1.25rem; font-weight: bold; color: var(--accent); margin-bottom: 15px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid var(--primary); color: #fff; margin-bottom: 15px; font-size: 16px; outline: none; }
        .price-display { text-align: center; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed var(--border); }
        .current-price { font-size: 2.2rem; color: var(--price-text); font-weight: bold; font-family: 'Oxanium'; }
        .order-btn { background: linear-gradient(45deg, var(--primary), #4752c4); color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; }

        /* 管理模式 */
        .admin-login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .admin-fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none; }
        .admin-bar { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a25; padding: 15px; border-top: 2px solid var(--primary); z-index: 1999; justify-content: center; gap: 20px; }
        .admin-edit-zone { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--accent); }
        .admin-edit-zone textarea { width: 100%; background: #111; color: #4dfd63; height: 80px; font-family: monospace; }
    </style>
</head>
<body>

<header><div class="logo">GUNSLINGER STORE</div></header>

<div class="container">
    <div class="tool-box">
        <span style="font-weight: bold; color: var(--accent);">💰 匯率助手 (1:5)</span>
        <input type="number" id="rmb" placeholder="人民幣" oninput="calc()">
        <span>➔</span> <span id="twd" style="font-size: 1.3rem; color: var(--price-text); font-weight: bold;">0</span> <small>TWD</small>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterItems('all', event)">全部</button>
        <button class="filter-btn" onclick="filterItems('topup', event)">手遊代儲</button>
        <button class="filter-btn" onclick="filterItems('card', event)">點數卡</button>
        <button class="filter-btn" onclick="filterItems('panel', event)">代購面板</button>
        <button class="filter-btn" onclick="filterItems('vip', event)">代付/會員</button>
    </div>

    <div id="productGrid" class="grid"></div>
</div>

<div id="loginOverlay" class="admin-login-overlay">
    <h2 style="color: #fff; margin-bottom: 20px;">管理員身份驗證</h2>
    <div id="g_id_onload"
         data-client_id="你的_GOOGLE_CLIENT_ID"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
    <button onclick="closeLogin()" style="margin-top: 30px; background: none; border: 1px solid #555; color: #888; cursor: pointer; padding: 5px 15px; border-radius: 5px;">關閉視窗</button>
</div>

<button class="admin-fab" onclick="showLogin()">🔑</button>

<div class="admin-bar" id="adminBar">
    <button onclick="addNewProduct()" style="padding:10px; cursor:pointer;">＋ 新增商品</button>
    <button onclick="copyData()" style="padding:10px; background:var(--primary); color:#fff; cursor:pointer;">💾 複製最新資料 JSON</button>
    <button onclick="logoutAdmin()" style="padding:10px; cursor:pointer;">登出管理</button>
</div>

<script>
    let isEditMode = false;
    
    // 🏆 內建保險商品庫 (即使伺服器休眠重啟，這裡也會有資料)
    let products = [
        { "id": "steam", "category": "card", "title": "🎮 Steam 蒸氣卡 (15種面額)", "options": [{"label": "2310元", "price": 2450}, {"label": "1000元", "price": 1060}, {"label": "100元", "price": 118}] },
        { "id": "brawl", "category": "topup", "title": "🌵 荒野亂鬥 Brawl Stars", "options": [{"label": "2000+200 寶石", "price": 3190}, {"label": "高級通行證", "price": 410}] },
        { "id": "gs", "category": "topup", "title": "⚔️ 原神 Genshin Impact", "options": [{"label": "8080 結晶", "price": 2500}, {"label": "空月祝福", "price": 150}] },
        { "id": "emo", "category": "panel", "title": "👾 EMO ESP 面板", "options": [{"label": "租用月卡", "price": 400}] }
    ];

    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

    // Google 登入後的回傳處理
    async function handleCredentialResponse(response) {
        const res = await fetch('/api/google-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });

        if (res.ok) {
            const data = await res.json();
            isEditMode = true;
            closeLogin();
            document.getElementById('adminBar').style.display = 'flex';
            render();
            alert("✅ 管理員 " + data.name + "，登入成功！");
        } else {
            alert("❌ 驗證失敗：您沒有管理權限。");
        }
    }

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.category = p.category;
            
            let adminUI = isEditMode ? `<div class="admin-edit-zone">
                <input type="text" value="${p.title}" onchange="products[${i}].title=this.value" style="width:100%;margin-bottom:5px;">
                <textarea onchange="try{products[${i}].options=JSON.parse(this.value);render();}catch(e){alert('格式錯了')}">${JSON.stringify(p.options)}</textarea>
                <button onclick="products.splice(${i},1);render()" style="color:red;cursor:pointer;">[ 刪除 ]</button>
            </div>` : '';

            card.innerHTML = `${adminUI}<div class="card-title">${p.title}</div>
                <select onchange="document.getElementById('p-${i}').innerText = Number(this.value).toLocaleString()">
                    ${p.options.map(opt => `<option value="${opt.price}">${opt.label}</option>`).join('')}
                </select>
                <div class="price-display">NT$ <span class="current-price" id="p-${i}">${p.options[0].price.toLocaleString()}</span></div>
                <a href="https://discord.gg/aveVvmcpsZ" class="order-btn" target="_blank">立即開單</a>`;
            grid.appendChild(card);
        });
    }

    function logoutAdmin() { isEditMode = false; document.getElementById('adminBar').style.display = 'none'; render(); }
    function addNewProduct() { products.unshift({ id: Date.now(), category: "topup", title: "新商品", options: [{label: "100面額", price: 100}] }); render(); }
    function calc() { let r = document.getElementById('rmb').value; document.getElementById('twd').innerText = r ? (r * 5).toLocaleString() : 0; }
    function filterItems(cat, e) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.style.display = (cat === 'all' || c.dataset.category === cat) ? 'flex' : 'none');
    }
    function copyData() {
        navigator.clipboard.writeText(JSON.stringify(products, null, 2)).then(() => alert("✅ 資料已複製！請去 GitHub 貼上更新 products 陣列。"));
    }

    render();
</script>
</body>
</html>
